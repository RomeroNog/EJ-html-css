<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cssLogin/loginStyle.css">
    <script src="javascriptLogin/loginJs.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="imgLogin/logo_petshop.avif" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    <div class="caixa-logins">
        <div class="lista-logins">
            <h3>Logins Válidos</h2>
                <ul class="lista">
                    <li class="usuario-valido"><div class="img-usuario"><img src="imgLogin/pata-de-cachorro.png" alt="pata-de-cachorro" width="25px" height="25px"></div>
                        <div class="texto-usuario">Usuário:admin  Senha:123</div></li>
                    <li class="usuario-valido"><div class="img-usuario"><img src="imgLogin/pata-de-cachorro.png" alt="pata-de-cachorro" width="25px" height="25px"></div>
                        <div class="texto-usuario">Usuário:user  Senha:user123</div></li>
                    <li class="usuario-valido"><div class="img-usuario"><img src="imgLogin/pata-de-cachorro.png" alt="pata-de-cachorro" width="25px" height="25px"></div>
                        <div class="texto-usuario">Usuário:guest  Senha:guest123</div></li>
                </ul>
        </div>
    </div>
    <div class="login-container">
        <div class="image-container">
            <img src="imgLogin/petshop_central.avif" alt="petshop central" >
        </div>
        <div class="login-content">
            <h2>Login</h2>
            <form action="">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                    <br>
                    <label for="password">Senha</label><br>
                    <input type="password" id="password" name="password" required>
                    <img src="imgLogin/olho_A.png" alt="Mostrar senha" id="olho" class="olho" onclick="alternarSenha()">
                    
                    <button type="submit" onclick="validarLogin(event)">Login</button>
            </form>
        </div>
    </div>
        

</body>
</html>
